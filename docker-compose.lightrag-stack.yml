# Docker Compose stack for running LightRAG with externalized production-style
# storage backends. Existing local JSON/NanoVectorDB/NetworkX data is not used
# or migrated by this file; all persistent state goes into named Docker volumes.

name: lightrag-stack

services:
  lightrag:
    # Local source image. This intentionally does not use
    # ghcr.io/hkuds/lightrag:latest because this stack is meant for local
    # development and later source-code changes.
    image: ${STACK_LIGHTRAG_IMAGE:-lightrag-stack:local}
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    ports:
      - "${STACK_LIGHTRAG_BIND_HOST:-0.0.0.0}:${STACK_LIGHTRAG_PORT:-9621}:9621"
    environment:
      LIGHTRAG_RUNTIME_TARGET: compose
      HOST: 0.0.0.0
      PORT: "9621"
      WORKERS: "1"

      WORKING_DIR: /app/data/rag_storage
      INPUT_DIR: /app/data/inputs
      PROMPT_DIR: /app/data/prompts

      LIGHTRAG_KV_STORAGE: PGKVStorage
      LIGHTRAG_DOC_STATUS_STORAGE: PGDocStatusStorage
      LIGHTRAG_VECTOR_STORAGE: QdrantVectorDBStorage
      LIGHTRAG_GRAPH_STORAGE: Neo4JStorage

      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${STACK_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${STACK_POSTGRES_PASSWORD:-123456}
      POSTGRES_DATABASE: ${STACK_POSTGRES_DATABASE:-rag}
      POSTGRES_MAX_CONNECTIONS: ${STACK_POSTGRES_MAX_CONNECTIONS:-25}

      QDRANT_URL: http://qdrant:6333

      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USERNAME: ${STACK_NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${STACK_NEO4J_PASSWORD:-123456}
      NEO4J_DATABASE: ${STACK_NEO4J_DATABASE:-neo4j}

      MINERU_API_MODE: local
      MINERU_POLL_INTERVAL_SECONDS: ${STACK_MINERU_POLL_INTERVAL_SECONDS:-2}
      MINERU_MAX_POLLS: ${STACK_MINERU_MAX_POLLS:-900}
      MINERU_HTTP_TIMEOUT_SECONDS: ${STACK_MINERU_HTTP_TIMEOUT_SECONDS:-1800}
      MINERU_LOCAL_ENDPOINT: ${STACK_MINERU_LOCAL_ENDPOINT:-http://mineru-api:8000}
      MINERU_LOCAL_BACKEND: ${STACK_MINERU_LOCAL_BACKEND:-hybrid-auto-engine}
      MINERU_LOCAL_PARSE_METHOD: ${STACK_MINERU_LOCAL_PARSE_METHOD:-auto}
      MINERU_LOCAL_IMAGE_ANALYSIS: ${STACK_MINERU_LOCAL_IMAGE_ANALYSIS:-true}

      LIGHTRAG_PARSER: ${STACK_LIGHTRAG_PARSER:-docx:native-teP,pdf:mineru-iteP,png:mineru-iP,jpg:mineru-iP,jpeg:mineru-iP,*:legacy-R}
      VLM_PROCESS_ENABLE: ${STACK_VLM_PROCESS_ENABLE:-false}

    volumes:
      - lightrag_rag_storage:/app/data/rag_storage
      - lightrag_inputs:/app/data/inputs
      - lightrag_prompts:/app/data/prompts
      - lightrag_tiktoken:/app/data/tiktoken
      # Existing LLM / embedding / API-key settings can stay in .env.
      # OS environment above wins over values loaded from this file.
      - ${STACK_DOTENV_FILE:-./.env}:/app/.env:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:9621/health', timeout=5).read()"
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  postgres:
    image: ${STACK_POSTGRES_IMAGE:-gzdaniel/postgres-for-rag:16.6}
    ports:
      - "${STACK_POSTGRES_BIND_HOST:-127.0.0.1}:${STACK_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_USER: ${STACK_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${STACK_POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${STACK_POSTGRES_DATABASE:-rag}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"'
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    stop_grace_period: 30s
    restart: unless-stopped

  qdrant:
    image: ${STACK_QDRANT_IMAGE:-qdrant/qdrant:latest}
    ports:
      - "${STACK_QDRANT_BIND_HOST:-127.0.0.1}:${STACK_QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - 'PORT_HEX="$(printf ''%04X'' 6333)"; cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -q ":$${PORT_HEX} "'
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    stop_grace_period: 30s
    restart: unless-stopped

  neo4j:
    image: ${STACK_NEO4J_IMAGE:-neo4j:5-community}
    ports:
      - "${STACK_NEO4J_HTTP_BIND_HOST:-127.0.0.1}:${STACK_NEO4J_HTTP_PORT:-7474}:7474"
      - "${STACK_NEO4J_BOLT_BIND_HOST:-127.0.0.1}:${STACK_NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${STACK_NEO4J_USERNAME:-neo4j}/${STACK_NEO4J_PASSWORD:-123456}
      NEO4J_dbms_default__database: ${STACK_NEO4J_DATABASE:-neo4j}
      NEO4J_dbms_security_auth__minimum__password__length: ${STACK_NEO4J_MIN_PASSWORD_LENGTH:-6}
      NEO4J_server_memory_heap_initial__size: ${STACK_NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${STACK_NEO4J_HEAP_MAX:-2G}
      NEO4J_server_memory_pagecache_size: ${STACK_NEO4J_PAGECACHE:-1G}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        - CMD-SHELL
        - 'PORT_HEX="$(printf ''%04X'' 7687)"; cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -q ":$${PORT_HEX} "'
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped

  # LightRAG's MinerU local client talks to POST /tasks, GET /tasks/{id}, and
  # GET /tasks/{id}/result. The local development image in
  # `.docker/mineru/Dockerfile` exposes the official mineru-api protocol on
  # port 8000 and uses the full MinerU core install on the vLLM base image.
  #
  # Start it with:
  #   docker compose --env-file .env.lightrag-stack -f docker-compose.lightrag-stack.yml --profile mineru up -d
  #
  # If you deploy MinerU separately, leave this profile disabled and set
  # STACK_MINERU_LOCAL_ENDPOINT to the reachable URL instead.
  mineru-api:
    profiles: ["mineru"]
    image: ${STACK_MINERU_IMAGE:-mineru:latest}
    command: ["mineru-api", "--host", "0.0.0.0", "--port", "8000"]
    gpus: all
    ipc: host
    shm_size: "32gb"
    environment:
      MINERU_MODEL_SOURCE: ${STACK_MINERU_MODEL_SOURCE:-local}
    ports:
      - "${STACK_MINERU_BIND_HOST:-127.0.0.1}:${STACK_MINERU_PORT:-8000}:8000"
    volumes:
      - mineru_cache:/root/.cache
      - mineru_outputs:/tmp/mineru
    healthcheck:
      test:
        - CMD-SHELL
        - 'python3 -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'', timeout=5).read()"'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 2m
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  lightrag_rag_storage:
  lightrag_inputs:
  lightrag_prompts:
  lightrag_tiktoken:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  mineru_cache:
  mineru_outputs:
